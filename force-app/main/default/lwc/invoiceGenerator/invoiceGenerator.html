<template>

    <lightning-card>

        <div class="slds-p-around_medium slds-text-align_center slds-border_bottom">

            <img src={logo}
                 style="max-height:70px;" />

            <h1 class="slds-text-heading_large">
                INVOICE GENERATOR
            </h1>

        </div>

        <template if:true={isStepOne}>
            <div class="slds-p-around_medium">

                <div class="slds-box">
                    <p class="slds-text-title">Opportunity</p>
                    <p class="slds-text-heading_small">
                        {opportunityName}
                    </p>
                </div>

                <div class="slds-text-align_right slds-m-top_medium">
                    <lightning-button
                        label="Next"
                        variant="brand"
                        onclick={nextStep}>
                    </lightning-button>
                </div>

            </div>
        </template>

        <template if:true={isStepTwo}>

            <div class="slds-p-around_medium">

                <div class="slds-text-align_right slds-m-bottom_medium">
                    <lightning-button
                        label="Add Line Item"
                        icon-name="utility:add"
                        onclick={addLineItem}>
                    </lightning-button>
                </div>

                <div class="slds-grid slds-box slds-theme_shade slds-text-title_bold">

                    <div class="slds-col slds-size_1-of-4">Product</div>
                    <div class="slds-col slds-size_1-of-4">Qty</div>
                    <div class="slds-col slds-size_1-of-4">Price</div>
                    <div class="slds-col slds-size_1-of-4">Total</div>

                </div>

                <template for:each={lineItems} for:item="item" for:index="index">

                    <div key={item.id} class="slds-grid slds-box">

                        <div class="slds-col slds-size_1-of-4">
                            <lightning-combobox
                                value={item.productName}
                                options={productOptions}
                                data-index={index}
                                data-field="productName"
                                onchange={handleChange}>
                            </lightning-combobox>
                        </div>

                        <div class="slds-col slds-size_1-of-4">
                            <lightning-input
                                type="number"
                                value={item.quantity}
                                data-index={index}
                                data-field="quantity"
                                onchange={handleChange}>
                            </lightning-input>
                        </div>

                        <div class="slds-col slds-size_1-of-4">
                            <lightning-input
                                type="number"
                                value={item.price}
                                data-index={index}
                                data-field="price"
                                onchange={handleChange}>
                            </lightning-input>
                        </div>

                        <div class="slds-col slds-size_1-of-4">
                            <lightning-input value={item.total} disabled>
                            </lightning-input>
                        </div>

                    </div>

                </template>

                <div class="slds-box slds-theme_alt-inverse slds-m-top_medium slds-text-align_right">

                    <h2 class="slds-text-heading_medium">
                        Grand Total: INR {totalAmount}
                    </h2>

                </div>

                <div class="slds-grid slds-grid_align-spread slds-m-top_medium">

                    <lightning-button
                        label="Back"
                        onclick={previousStep}>
                    </lightning-button>

                    <lightning-button
                        label="Save & Download PDF"
                        variant="brand"
                        onclick={saveInvoice}>
                    </lightning-button>

                </div>

            </div>

        </template>

    </lightning-card>

</template>
